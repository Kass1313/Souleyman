case'glossary':return subH('المعجم','Glossaire')+`<div style="flex:1;overflow-y:auto">${GLOSSARY.map(g=>`<div class="card"><div style="font-weight:700;color:var(--gold);font-size:15px;margin-bottom:6px">${g.term}</div><div style="font-size:13px;line-height:1.7;white-space:pre-line">${g.def}</div></div>`).join("")}</div>`;
case'sins':return subH('الكبائر','7 Péchés majeurs')+`<div style="flex:1;overflow-y:auto">${MAJOR_SINS.map((s,i)=>`<div class="card"><div style="font-weight:700;color:var(--gold);font-size:15px">${i+1}. ${s.name}</div><div style="font-size:13px;line-height:1.7;margin-top:6px;white-space:pre-line">${s.desc}</div><div style="font-size:10px;color:var(--gold-dim);margin-top:4px">${s.ref}</div></div>`).join("")}</div>`;
case'nawaqid':return subH('النواقض','Annulatifs de l\'Islam')+`<div style="flex:1;overflow-y:auto"><div class="card"><div class="card-title">Source : Cheikh Muhammad Ibn 'Abd al-Wahhâb</div></div>${NAWAQID.map(n=>`<div class="card"><div style="font-weight:700;color:var(--gold);font-size:14px">${n.name}</div><div style="font-size:13px;line-height:1.7;margin-top:6px;white-space:pre-line">${n.desc}</div></div>`).join("")}</div>`;
case'miracles':return subH('إعجاز','Miracles du Coran')+`<div style="flex:1;overflow-y:auto">${MIRACLES.map(m=>`<div class="card"><div style="font-weight:700;color:var(--gold);font-size:15px">${m.name}</div><div style="font-size:13px;line-height:1.7;margin-top:6px;white-space:pre-line">${m.desc}</div><div style="font-size:10px;color:var(--gold-dim);margin-top:4px">${m.ref}</div></div>`).join("")}</div>`;
case'scholars':const cats=["Tous","Classique","Réformateur","Contemporain"];const filt=S.scholarFilter==="Tous"?SCHOLARS:SCHOLARS.filter(s=>s.cat===S.scholarFilter);return subH('العلماء','Savants')+`<div class="cat-bar">${cats.map(c=>`<button class="cat-btn ${S.scholarFilter===c?'active':''}" onclick="S.scholarFilter='${c}';R()">${c}</button>`).join("")}</div><div style="flex:1;overflow-y:auto">${filt.map(s=>`<div class="card"><div style="font-weight:700;font-size:15px;color:var(--gold)">${s.name} <span style="font-size:18px">${s.ar}</span></div><div style="font-size:11px;color:var(--text2);margin:2px 0">${s.period} • ${s.cat} • ${s.specialty}</div><div style="font-size:13px;margin-top:6px"><strong>Œuvres :</strong> ${s.works}</div><div style="font-size:12px;margin-top:4px;color:var(--text2)">${s.note}</div>${s.citation?`<div style="font-size:13px;margin-top:8px;padding:8px;border-left:3px solid var(--gold);font-style:italic">« ${s.citation} »</div>`:''}</div>`).join("")}</div>`;
case'duas':return subH('الدُّعَاء','Du\'a')+`<div style="flex:1;overflow-y:auto">${DUAS.map((d,i)=>`<div class="li" onclick="openSub('dua-cat',${i})"><div class="li-t">${d.cat}</div><div class="li-s">${d.items.length} invocations</div></div>`).join("")}</div>`;
case'dua-cat':const d=DUAS[S.subData];return subH(d.cat,'')+`<div style="flex:1;overflow-y:auto">${d.items.map(i=>`<div class="card"><div style="font-weight:700;margin-bottom:6px">${i.title}</div><div style="font-size:17px;color:var(--gold);text-align:right;line-height:2">${i.ar}</div><div style="font-size:13px;margin:6px 0;line-height:1.6">${i.fr}</div>${i.context?`<div style="font-size:12px;color:var(--text2);margin:6px 0;padding:8px;background:var(--bg);border-radius:8px;line-height:1.5">📝 ${i.context}</div>`:''}<div style="font-size:10px;color:var(--gold-dim)">Source : ${i.ref}</div></div>`).join("")}</div>`;
case'books':return subH('📕','Livres')+`<div style="flex:1;overflow-y:auto">${BOOKS.map(b=>`<div class="stitle">${b.cat}</div>${b.items.map(i=>`<div class="card"><div style="font-weight:700">${i.title}</div><div style="font-size:12px;color:var(--text2)">✍️ ${i.author} • ${i.level}</div></div>`).join("")}`).join("")}</div>`;

// QUIZ
case'quiz-select':const themes=Object.keys(QUIZ_DATA);return subH('🧠','Quiz')+`<div style="flex:1;overflow-y:auto;padding:16px"><div style="text-align:center;font-size:36px;margin-bottom:10px">🧠</div><div style="text-align:center;font-size:16px;color:var(--gold);font-weight:700;margin-bottom:16px">Choisis un thème et un niveau</div>${themes.map(t=>`<div class="card" style="cursor:pointer"><div style="font-weight:700;color:var(--gold);margin-bottom:8px">${t}</div><div style="display:flex;gap:8px">${QUIZ_DATA[t].debutant?`<button class="hdr-btn" onclick="startQuiz('${t}','debutant')">Débutant (${QUIZ_DATA[t].debutant.length})</button>`:''} ${QUIZ_DATA[t].avance?`<button class="hdr-btn" onclick="startQuiz('${t}','avance')">Avancé (${QUIZ_DATA[t].avance.length})</button>`:''}</div></div>`).join("")}</div>`;
case'quiz':const qList=QUIZ_DATA[S.quizTheme]?.[S.quizLevel]||[];if(S.quizIdx>=qList.length){const key=S.quizTheme+"_"+S.quizLevel;S.quizStats[key]={score:S.quizScore,total:qList.length,date:new Date().toLocaleDateString('fr-FR')};sv("s_qstats",S.quizStats);return subH('🧠','Résultat')+`<div style="flex:1;overflow-y:auto;padding:20px;text-align:center"><div style="font-size:48px">${S.quizScore>=qList.length*0.8?'🥇':S.quizScore>=qList.length*0.5?'🥈':'🥉'}</div><div style="font-size:24px;color:var(--gold);font-weight:700;margin:10px 0">${S.quizScore}/${qList.length}</div><div style="font-size:14px;color:var(--text2)">${S.quizTheme} — ${S.quizLevel}</div><div style="display:flex;gap:8px;justify-content:center;margin-top:16px"><button class="grid-btn" style="width:130px" onclick="startQuiz('${S.quizTheme}','${S.quizLevel}')">🔄 Refaire</button><button class="grid-btn" style="width:130px" onclick="openSub('quiz-select')">← Thèmes</button></div></div>`}
const q=qList[S.quizIdx],pct=Math.round(S.quizIdx/qList.length*100);return subH(S.quizTheme,S.quizLevel)+`<div class="qprog"><span>${S.quizIdx+1}/${qList.length}</span><div class="qbar"><div class="qfill" style="width:${pct}%"></div></div><span>${S.quizScore}pts</span></div><div style="padding:20px 16px"><div class="quiz-q">${q.q}</div>${q.opts.map((o,i)=>{let cls="quiz-opt";if(S.quizAnswered){if(i===q.c)cls+=" correct";else if(i===S.quizSelected&&i!==q.c)cls+=" wrong"}return`<button class="${cls}" onclick="ansQuiz(${i})" ${S.quizAnswered?'disabled':''}>${o}</button>`}).join("")}${S.quizAnswered?`<div class="quiz-expl">${q.e}</div><button class="grid-btn" style="width:100%;margin-top:10px" onclick="nextQuiz()">Suivant →</button>`:''}</div>`;

case'quiz-stats':return subH('📊','Stats Quiz')+`<div style="flex:1;overflow-y:auto">${Object.keys(S.quizStats).length===0?'<div style="padding:40px;text-align:center;color:var(--text2)">Aucun quiz terminé</div>':Object.entries(S.quizStats).map(([k,v])=>`<div class="card"><div style="font-weight:700;color:var(--gold)">${k.replace('_',' — ')}</div><div style="font-size:20px;color:var(--gold);font-weight:700;margin:6px 0">${v.score}/${v.total} (${Math.round(v.score/v.total*100)}%)</div><div style="font-size:11px;color:var(--text2)">${v.date}</div></div>`).join("")}</div>`;

case'flashcards':return subH('🎴','Flashcards')+`<div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px"><div style="font-size:12px;color:var(--text2);margin-bottom:8px">${S.flashIdx+1} / ${FLASHCARD_DATA.length}</div><div class="flash" onclick="S.flashFlipped=!S.flashFlipped;R()" style="width:100%;max-width:340px;${S.flashFlipped?'background:var(--user-bg);border-color:var(--gold-dim)':''}"><div>${S.flashFlipped?`<div style="font-size:13px;color:var(--text2);margin-bottom:6px">Réponse :</div><div style="color:var(--gold)">${FLASHCARD_DATA[S.flashIdx].back}</div>`:`<div style="color:var(--gold);font-weight:700">${FLASHCARD_DATA[S.flashIdx].front}</div><div style="font-size:11px;color:var(--text2);margin-top:8px">Touche pour retourner</div>`}</div></div><div style="display:flex;gap:10px;margin-top:16px"><button class="grid-btn" style="width:100px" onclick="S.flashIdx=Math.max(0,S.flashIdx-1);S.flashFlipped=false;R()">← Préc.</button><button class="grid-btn" style="width:100px" onclick="S.flashIdx=Math.min(FLASHCARD_DATA.length-1,S.flashIdx+1);S.flashFlipped=false;R()">Suiv. →</button></div><button class="hdr-btn" style="margin-top:12px" onclick="S.flashIdx=Math.floor(Math.random()*FLASHCARD_DATA.length);S.flashFlipped=false;R()">🎲 Aléatoire</button></div>`;

case'search':return subH('🔍','Recherche globale')+`<input class="search-input" placeholder="Chercher dans tout..." value="${S.globalSearch}" oninput="S.globalSearch=this.value;R()"/><div style="flex:1;overflow-y:auto">${S.globalSearch.length<2?'<div style="padding:30px;text-align:center;color:var(--text2)">Tape au moins 2 caractères</div>':renderSearchResults()}</div>`;

case'calendar':return subH('📅','Calendrier')+`<div style="flex:1;overflow-y:auto"><div class="card" style="text-align:center"><div style="font-size:20px;color:var(--gold)">${getHijri()}</div></div>${ISLAMIC_EVENTS.map(e=>`<div class="card"><div style="font-weight:700;color:var(--gold)">${e.name}</div><div style="font-size:13px;margin-top:4px;line-height:1.6">${e.desc}</div></div>`).join("")}</div>`;

case'khutba':return subH('🎤','Khutba')+`<div style="flex:1;overflow-y:auto"><div class="card" style="text-align:center"><div style="font-size:36px">🎤</div><div style="font-size:16px;color:var(--gold);font-weight:700;margin-top:6px">Générateur de Rappel</div></div><div class="stitle">THÈMES</div>${KHUTBA_THEMES.map(t=>`<div class="li" onclick="genKhutba('${t.replace(/'/g,"\\'")}')"><div class="li-t">📝 ${t}</div></div>`).join("")}<div class="card"><div style="font-weight:700;margin-bottom:6px">✍️ Thème libre</div><input class="sett-input" style="width:100%" id="ck" placeholder="Ex: La patience"/><button class="grid-btn" style="width:100%;margin-top:8px" onclick="const v=document.getElementById('ck')?.value;if(v)genKhutba(v)">Générer</button></div></div>`;

case'history':const hf=S.histSearch?S.history.filter(h=>h.preview.toLowerCase().includes(S.histSearch.toLowerCase())):S.history;return subH('Historique','')+`<input class="search-input" placeholder="🔍 Rechercher..." value="${S.histSearch}" oninput="S.histSearch=this.value;R()"/><div style="flex:1;overflow-y:auto">${hf.length===0?'<div style="padding:40px;text-align:center;color:var(--text2)">Vide</div>':hf.map((h,i)=>`<div class="li" onclick="S.messages=S.history[${i}].messages;S.tab='chat';S.sub=null;R()"><div style="font-size:10px;color:var(--text2);font-family:var(--mono)">${h.date}</div><div style="font-size:13px;margin-top:3px">${esc(h.preview).slice(0,60)}</div></div>`).join("")}</div>`;
case'favs':return subH('⭐','Favoris')+`<div style="flex:1;overflow-y:auto">${S.favorites.length===0?'<div style="padding:40px;text-align:center;color:var(--text2)">Aucun</div>':S.favorites.map((f,i)=>`<div class="card" style="position:relative"><div style="font-size:11px;color:var(--text2)">Q: ${esc(f.q).slice(0,80)}</div><div style="font-size:13px;margin-top:6px;line-height:1.6">${esc(f.a).slice(0,200)}...</div><button onclick="S.favorites.splice(${i},1);sv('s_favs',S.favorites);R()" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#e74c3c;cursor:pointer">✕</button></div>`).join("")}</div>`;
case'settings':return subH('⚙️','Réglages')+`<div style="flex:1;overflow-y:auto">
<div class="sett-group"><div class="sett-label">👤 Profil</div><div class="sett-row"><span class="sett-name">Prénom</span><input class="sett-input" value="${S.profile.name}" onchange="S.profile.name=this.value;sv('s_profile',S.profile)" placeholder="Ton prénom"/></div><div class="sett-row"><span class="sett-name">Niveau</span><select class="sett-select" onchange="S.profile.level=this.value;sv('s_profile',S.profile)"><option value="debutant" ${S.profile.level==='debutant'?'selected':''}>Débutant</option><option value="intermediaire" ${S.profile.level==='intermediaire'?'selected':''}>Intermédiaire</option><option value="avance" ${S.profile.level==='avance'?'selected':''}>Avancé</option></select></div></div>
<div class="sett-group"><div class="sett-label">🎨 Apparence</div><div class="sett-row"><span class="sett-name">Mode sombre</span><div class="toggle ${S.theme==='dark'?'on':''}" onclick="S.theme=S.theme==='dark'?'light':'dark';sv('s_theme',S.theme);R()"></div></div><div class="sett-row"><span class="sett-name">Taille texte</span><div style="display:flex;gap:6px;align-items:center"><button class="hdr-btn" onclick="S.fontSize=Math.max(11,S.fontSize-1);sv('s_fontsize',S.fontSize);R()">A-</button><span class="sett-val">${S.fontSize}px</span><button class="hdr-btn" onclick="S.fontSize=Math.min(20,S.fontSize+1);sv('s_fontsize',S.fontSize);R()">A+</button></div></div></div>
<div class="sett-group"><div class="sett-label">🧠 Base de données (${S.kb.length})</div>${S.kb.map((k,i)=>`<div class="kb-item"><span class="kb-text">${esc(k)}</span><button class="kb-del" onclick="S.kb.splice(${i},1);sv('s_kb',S.kb);R()">✕</button></div>`).join("")}<button class="sett-btn" onclick="S.modal={type:'addkb'};R()">+ Ajouter</button></div>
<div class="sett-group"><div class="sett-label">🔑 API</div><div class="sett-row"><span class="sett-name">Clé</span><span class="sett-val">${S.apiKey.slice(0,8)}...</span></div><div class="sett-row"><span class="sett-name">Modèle</span><span class="sett-val">${cachedModel||'Auto'}</span></div><button class="sett-btn" onclick="const k=prompt('Nouvelle clé:');if(k&&k.length>10){S.apiKey=k;sv('s_key',k);cachedModel='';localStorage.removeItem('s_model');R()}">Changer clé</button><button class="sett-btn" onclick="testApi()">🧪 Tester</button><div id="test-result" style="font-size:11px;margin-top:6px"></div></div>
<div class="sett-group"><button class="sett-btn danger" onclick="if(confirm('Effacer historique ?')){S.history=[];sv('s_history',[]);R()}">🗑️ Effacer historique</button></div>
<div style="padding:16px;text-align:center;font-size:10px;color:var(--text2)">Souleyman v5.0<br>Gemini gratuit</div></div>`;
default:return''}}

function rModal(){if(S.modal?.type==="edit")return`<div class="modal-overlay" onclick="if(event.target===this){S.modal=null;R()}"><div class="modal"><div class="modal-title">✏️ Modifier</div><textarea id="medit">${S.modal.text}</textarea><div class="modal-btns"><button class="modal-btn" onclick="S.modal=null;R()">Annuler</button><button class="modal-btn primary" onclick="S.messages[S.modal.index].content=document.getElementById('medit').value;S.modal=null;R()">OK</button></div></div></div>`;
if(S.modal?.type==="addkb")return`<div class="modal-overlay" onclick="if(event.target===this){S.modal=null;R()}"><div class="modal"><div class="modal-title">🧠 Ajouter</div><textarea id="mkb" placeholder="Info à retenir..."></textarea><div class="modal-btns"><button class="modal-btn" onclick="S.modal=null;R()">Annuler</button><button class="modal-btn primary" onclick="const t=document.getElementById('mkb').value.trim();if(t){S.kb.push(t);sv('s_kb',S.kb)}S.modal=null;R()">OK</button></div></div></div>`;return''}

// SEARCH
function renderSearchResults(){const q=S.globalSearch.toLowerCase();let r=[];
PROPHETS.forEach(p=>{if((p.name+p.summary).toLowerCase().includes(q))r.push({type:'Prophète',title:p.name,sub:p.summary.slice(0,80)})});
GLOSSARY.forEach(g=>{if((g.term+g.def).toLowerCase().includes(q))r.push({type:'Glossaire',title:g.term,sub:g.def.slice(0,80)})});
COMPANIONS.forEach(c=>{if((c.name+c.bio).toLowerCase().includes(q))r.push({type:'Compagnon',title:c.name,sub:c.bio.slice(0,80)})});
SCHOLARS.forEach(s=>{if((s.name+s.works).toLowerCase().includes(q))r.push({type:'Savant',title:s.name,sub:s.specialty})});
NAMES99.forEach(n=>{if((n.nom+n.fr).toLowerCase().includes(q))r.push({type:'Nom d\'Allah',title:n.nom+' — '+n.fr,sub:n.ar})});
DUAS.forEach(d=>d.items.forEach(i=>{if((i.title+i.fr).toLowerCase().includes(q))r.push({type:'Du\'a',title:i.title,sub:i.fr.slice(0,80)})}));
NAWAQID.forEach(n=>{if((n.name+n.desc).toLowerCase().includes(q))r.push({type:'Annulatif',title:n.name,sub:n.desc.slice(0,80)})});
MAJOR_SINS.forEach(s=>{if((s.name+s.desc).toLowerCase().includes(q))r.push({type:'Péché',title:s.name,sub:s.desc.slice(0,80)})});
return r.length===0?'<div style="padding:20px;text-align:center;color:var(--text2)">Aucun résultat</div>':r.map(x=>`<div class="li"><div style="font-size:9px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:1px">${x.type}</div><div class="li-t">${x.title}</div><div class="li-s">${x.sub}...</div></div>`).join("")}

// ===== ACTIONS =====
window.go=function(t){S.tab=t;S.sub=null;R()};
window.openSub=function(s,d){S.sub=s;S.subData=d??null;R()};
window.goBack=function(){if(S.sub==='prophet-d')S.sub='prophets';else if(S.sub==='dua-cat')S.sub='duas';else if(S.sub==='quiz')S.sub='quiz-select';else S.sub=null;S.subData=null;R()};
window.saveKey=function(){const k=document.getElementById("skey").value.trim();if(!k||k.length<10){const e=document.getElementById("serr");e.textContent="Clé invalide";e.style.display="block";return}S.apiKey=k;sv("s_key",k);R()};
window.newChat=function(){if(S.messages.length>1)saveHist();S.messages=[];R()};
window.quickChat=function(q){S.tab="chat";S.sub=null;S.messages=[];S.messages.push({role:"user",content:q});S.loading=true;R();callGemini()};
window.sendMsg=function(){const ta=document.getElementById("ci"),t=ta?.value?.trim();if(!t||S.loading)return;const kb=t.match(/rentre?\s*(dans)?\s*(ta|la)?\s*base\s*de?\s*donn[ée]e?s?\s*:?\s*(.+)/i);if(kb){S.kb.push(kb[3].trim());sv("s_kb",S.kb);S.messages.push({role:"user",content:t},{role:"model",content:`✅ Enregistré : **"${kb[3].trim()}"**\nGère ta base dans Réglages.`});R();return}S.messages.push({role:"user",content:t});S.loading=true;S.stats.total++;sv("s_stats",S.stats);R();callGemini()};
window.favMsg=function(i){const m=S.messages[i],q=S.messages[i-1]?.content||"",x=S.favorites.findIndex(f=>f.a===m.content);if(x>=0)S.favorites.splice(x,1);else S.favorites.push({q,a:m.content,date:new Date().toLocaleDateString('fr-FR')});sv("s_favs",S.favorites);R()};
window.editMsg=function(i){S.modal={type:"edit",index:i,text:S.messages[i].content};R()};
window.startQuiz=function(t,l){S.quizTheme=t;S.quizLevel=l;S.quizIdx=0;S.quizScore=0;S.quizAnswered=false;S.quizSelected=-1;S.sub='quiz';R()};
window.ansQuiz=function(i){if(S.quizAnswered)return;S.quizAnswered=true;S.quizSelected=i;const q=QUIZ_DATA[S.quizTheme]?.[S.quizLevel]?.[S.quizIdx];if(q&&i===q.c)S.quizScore++;R()};
window.nextQuiz=function(){S.quizIdx++;S.quizAnswered=false;S.quizSelected=-1;R()};
window.compareScholars=function(){const t=prompt("Sujet à comparer entre savants ?");if(t)quickChat(`Compare les avis des savants salafistes (Ibn Taymiyya, Ibn Bâz, Al-Albani, Ibn Outhaymin, Al-Fawzan) sur : "${t}".`)};
window.genKhutba=function(t){quickChat(`Prépare un rappel islamique complet sur : "${t}". Structure : 1. Bismillah 2. Versets + tafsir 3. Hadiths authentiques 4. Paroles de savants 5. Applications 6. Du'a.`)};
function saveHist(){if(S.messages.length<2)return;const f=S.messages.find(m=>m.role==="user");S.history.unshift({date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}),preview:f?.content||"...",messages:[...S.messages]});if(S.history.length>50)S.history.pop();sv("s_history",S.history)}

// ===== API =====
const MODELS=["gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];
let cachedModel=localStorage.getItem("s_model")||"";
async function detectModel(){if(cachedModel)return cachedModel;for(let i=0;i<MODELS.length;i++){try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELS[i]}:generateContent?key=${S.apiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{role:"user",parts:[{text:"1"}]}],generationConfig:{maxOutputTokens:5}})});const d=await r.json();if(d.candidates){cachedModel=MODELS[i];localStorage.setItem("s_model",cachedModel);return cachedModel}if(d.error?.code===404)continue;cachedModel=MODELS[i];localStorage.setItem("s_model",cachedModel);return cachedModel}catch(e){}}cachedModel=MODELS[0];return cachedModel}
async function callGemini(){try{if(!cachedModel)await detectModel();const kb=S.kb.length?S.kb.join("\n- "):"Aucune.",pr=`${S.profile.name||'?'}, ${S.profile.level}`,sys=SYSTEM_PROMPT.replace("{KB}",kb).replace("{PROF}",pr),cat=S.category!=="Général"?`\nCatégorie: ${S.category}.`:"";
const msgs=S.messages.filter(m=>m.role==="user"||m.role==="model").slice(-10).map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.content}]}));
const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${cachedModel}:generateContent?key=${S.apiKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:sys+cat}]},contents:msgs,generationConfig:{maxOutputTokens:8192,temperature:.7}})});
const txt=await res.text();let data;try{data=JSON.parse(txt)}catch(e){S.messages.push({role:"model",content:"⚠️ Réponse invalide."});return}
if(data.error){if(data.error.code===404){cachedModel="";localStorage.removeItem("s_model");S.messages.push({role:"model",content:"⚠️ Modèle indisponible. Réessaie."})}else if(data.error.code===429)S.messages.push({role:"model",content:"⏳ Limite temporaire. Attends 1-2 min."});else S.messages.push({role:"model",content:`⚠️ Erreur (${data.error.code}): ${data.error.message}`})}
else{const a=data.candidates?.[0]?.content?.parts?.map(p=>p.text).join("\n");if(a){S.messages.push({role:"model",content:a});saveHist()}else S.messages.push({role:"model",content:"⚠️ Réponse vide. Reformule."})}
}catch(e){S.messages.push({role:"model",content:`⚠️ ${e.message}`})}finally{S.loading=false;clearInterval(window._di);R()}}
window.testApi=async function(){const el=document.getElementById("test-result");if(el)el.innerHTML='⏳...';cachedModel="";localStorage.removeItem("s_model");const m=await detectModel();if(el)el.innerHTML=m?`<span style="color:#2ecc71">✅ ${m}</span>`:'<span style="color:#e74c3c">❌ Erreur</span>'};

// INIT
R();
if(S.apiKey&&!cachedModel)detectModel();

</script>
</body>
</html>
